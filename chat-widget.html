<style>
  .academy-chat-launcher {
    position: fixed;
    right: 22px;
    bottom: 22px;
    width: 62px;
    height: 62px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, #5aa69a, #3f8f82);
    color: #fff;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 14px 30px rgba(17, 22, 29, 0.22);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .academy-chat-widget {
    position: fixed;
    right: 22px;
    bottom: 98px;
    width: 360px;
    height: 540px;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 24px 60px rgba(17, 22, 29, 0.18);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
    font-family: Arial, Helvetica, sans-serif;
  }

  .academy-chat-widget.show { display: flex; }

  .academy-chat-header {
    background: linear-gradient(135deg, #5aa69a, #3f8f82);
    color: #fff;
    padding: 16px;
  }

  .academy-chat-header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .academy-chat-close-btn {
    border: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
  }

  .academy-chat-messages {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    background: #f8f6f2;
  }

  .academy-chat-row { margin-bottom: 10px; display: flex; }
  .academy-chat-row.user { justify-content: flex-end; }

  .academy-chat-bubble {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 80%;
    font-size: 14px;
  }

  .academy-chat-row.bot .academy-chat-bubble {
    background: #fff;
  }

  .academy-chat-row.user .academy-chat-bubble {
    background: #3f8f82;
    color: #fff;
  }

  .academy-chat-panel { padding: 12px; }

  .academy-chat-quick button {
    margin: 4px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #ccc;
    cursor: pointer;
  }

  .academy-chat-other-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #eef4f2;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
  }

  .academy-chat-form { display: none; margin-top: 10px; }
  .academy-chat-form.show { display: block; }

  .academy-chat-form input,
  .academy-chat-form textarea {
    width: 100%;
    margin-bottom: 8px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  .academy-chat-send {
    width: 100%;
    background: #5aa69a;
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
  }
</style>

<div class="academy-chat-widget" id="academyChatWidget">
  <div class="academy-chat-header">
    <div class="academy-chat-header-top">
      <strong>The Academy at VUMC</strong>
      <button onclick="academyToggleChat()" class="academy-chat-close-btn">×</button>
    </div>
  </div>

  <div class="academy-chat-messages" id="academyChatMessages">
    <div class="academy-chat-row bot">
      <div class="academy-chat-bubble">
        Hi! Ask about hours, meals, potty training, openings, enrollment, or tours.
      </div>
    </div>
  </div>

  <div class="academy-chat-panel">
    <div class="academy-chat-quick">
      <button onclick="academyQuickAsk('What are your hours?')">Hours</button>
      <button onclick="academyQuickAsk('What is your phone number?')">Phone</button>
      <button onclick="academyQuickAsk('Do you provide lunch?')">Meals</button>
      <button onclick="academyQuickAsk('When does potty training start?')">Potty Training</button>
      <button onclick="academyQuickAsk('Are there any openings?')">Openings</button>
      <button onclick="academyQuickAsk('How do I schedule a tour?')">Tour</button>
    </div>

    <button class="academy-chat-other-btn" onclick="academyToggleOtherQuestion()">
      I have a different question
    </button>

    <div class="academy-chat-form" id="academyChatForm">
      <input type="text" id="academyChatName" placeholder="Your name" required>
      <input type="email" id="academyChatEmail" placeholder="Your email" required>
      <textarea id="academyChatInput" placeholder="Type your question..." required></textarea>
      <button class="academy-chat-send" onclick="academySendChat()">Send</button>
    </div>
  </div>
</div>

<button class="academy-chat-launcher" onclick="academyToggleChat()">💬</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxE3Hdubuv-ggKSm6AeiwZ6K3mEZ4xkxF0_tjmTbXfWWczLxTxe4D5TOPX9K44kNcs3Fg/exec";

function academyToggleChat() {
  document.getElementById("academyChatWidget").classList.toggle("show");
}

function academyToggleOtherQuestion() {
  document.getElementById("academyChatForm").classList.toggle("show");
}

function academyAddChatMessage(text, who) {
  const row = document.createElement("div");
  row.className = "academy-chat-row " + who;
  row.innerHTML = '<div class="academy-chat-bubble">'+text+'</div>';
  document.getElementById("academyChatMessages").appendChild(row);
}

function academyQuickAsk(q) {
  academyAddChatMessage(q, "user");
  academyRequestChat(q, "", "");
}

function academySendChat() {
  const name = document.getElementById("academyChatName").value.trim();
  const email = document.getElementById("academyChatEmail").value.trim();
  const msg = document.getElementById("academyChatInput").value.trim();

  if (!name || !email || !msg) {
    academyAddChatMessage("Please fill out your name, email, and question.", "bot");
    return;
  }

  academyAddChatMessage(msg, "user");
  academyRequestChat(msg, name, email);
}

function academyRequestChat(message, name, email) {
  const script = document.createElement("script");
  script.src = SCRIPT_URL +
    "?q=" + encodeURIComponent(message) +
    "&name=" + encodeURIComponent(name) +
    "&email=" + encodeURIComponent(email);

  document.body.appendChild(script);
}
</script>
